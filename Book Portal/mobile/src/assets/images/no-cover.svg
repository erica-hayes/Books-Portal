  </defs>
  <rect width="300" height="400" fill="url(#bg)" />
  <rect x="72" y="80" width="156" height="210" rx="10" fill="#ffffff" stroke="#8aa0b6" stroke-width="4" />
  <line x1="150" y1="80" x2="150" y2="290" stroke="#8aa0b6" stroke-width="2" />
  <rect x="95" y="120" width="110" height="10" rx="5" fill="#b8c8d8" />
  <rect x="95" y="142" width="110" height="10" rx="5" fill="#b8c8d8" />
  <rect x="95" y="164" width="70" height="10" rx="5" fill="#b8c8d8" />
  <text x="150" y="335" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" fill="#415466">No Image</text>
</svg>

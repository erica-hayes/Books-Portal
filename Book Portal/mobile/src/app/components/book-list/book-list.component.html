<div class="books-container" *ngIf="books?.length; else emptyState">
  <div *ngFor="let book of books" class="book-item">
    <app-book-item [book]="book"></app-book-item>
  </div>
</div>

<ng-template #emptyState>
  <div class="empty-state">
    <p>No books are available right now.</p>
    <p>Tap Add to share your first book.</p>
  </div>
</ng-template>
